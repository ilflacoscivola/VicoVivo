<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Illustrata Genova - VicoVivo</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #f4f1ea; }

        /* Pannello Laterale */
        #panel {
            position: fixed;
            top: 0; right: -400px;
            width: 350px; height: 100vh;
            background: white; z-index: 1000;
            transition: 0.3s ease; padding: 20px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        #panel.active { right: 0; }
        #panel img { width: 100%; border-radius: 8px; margin: 15px 0; }
        .close-btn { cursor: pointer; float: right; font-weight: bold; font-size: 24px; }
        #panel-content h2 { margin-top: 0; }
        .category-badge { display: inline-block; background: #f39c12; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; }
        #poi-link { display: inline-block; margin-top: 10px; padding: 10px 15px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
        #poi-link:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Pannello Laterale -->
    <div id="panel">
        <span class="close-btn" onclick="closePanel()">×</span>
        <div id="panel-content">
            <span class="category-badge" id="poi-category"></span>
            <h2 id="poi-title">Seleziona un punto</h2>
            <img id="poi-img" src="" alt="Immagine POI" style="display:none;">
            <p id="poi-desc"></p>
            <a id="poi-link" href="#" target="_blank">Vedi su Google Maps</a>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Configurazione Mappa
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1,
            maxZoom: 2
        });

        // 2. Carica l'illustrazione
        const w = 4447, h = 6289; 
        const url = 'Mappa-VicoVivo.jpg';
        const bounds = [[0, 0], [h, w]];
        L.imageOverlay(url, bounds).addTo(map);
        map.fitBounds(bounds);

        // 3. Icone Personalizzate
        const createIcon = (iconName) => L.icon({
            iconUrl: `icone/${iconName}.svg`,
            iconSize: [38, 38],
            iconAnchor: [19, 38]
        });

        // 4. Mapping delle categorie
        const categoryLabels = {
            "dove-stare": "🏨 Dove Stare",
            "dove-bere-e-mangiare": "🍽️ Dove Bere e Mangiare",
            "dove-si-fa-tardi": "🎵 Dove Si Fa Tardi",
            "comunita-creative": "🎨 Comunità Creative"
        };

        // 5. Dati POI
        const pois = [
            // DOVE STARE

            {id: 2, name: "Piazza delle Erbe", desc: "Piazza, punto di ritrovo", img: "https://via.placeholder.com/300x200?text=Piazza+delle+Erbe", link: "https://www.google.com/maps/place/Piazza+delle+Erbe,+16123+Genova+GE,+Italy/", category: "dove-stare", coords: [1200, 600]},
            {id: 3, name: "Piazza Sarzano", desc: "Piazza, punto di ritrovo", img: "https://via.placeholder.com/300x200?text=Piazza+Sarzano", link: "https://www.google.com/maps/place/Piazza+Sarzano,+16128+Genova+GE,+Italy/", category: "dove-stare", coords: [1300, 700]},
            {id: 4, name: "Piazza San Lorenzo", desc: "Piazza, punto di ritrovo", img: "https://via.placeholder.com/300x200?text=Piazza+San+Lorenzo", link: "https://www.google.com/maps/place/Piazza+San+Lorenzo,+16123+Genova+GE,+Italy/", category: "dove-stare", coords: [1100, 800]},
            {id: 5, name: "Piazza De Ferrari", desc: "Piazza, punto di ritrovo", img: "https://via.placeholder.com/300x200?text=Piazza+De+Ferrari", link: "https://www.google.com/maps/place/Piazza+De+Ferrari,+16121+Genova+GE,+Italy/", category: "dove-stare", coords: [900, 900]},

           // DOVE BERE E MANGIARE
{id: 6, name: "Bar degli Asinelli", desc: "Via di Canneto", img: "https://via.placeholder.com/300x200?text=Bar+degli+Asinelli", link: "https://maps.app.goo.gl/CG92NHQrs4Yzvne47", category: "dove-bere-e-mangiare", coords: [1050, 750]},

{id: 10, name: "Fitz Birrificio Genovese", desc: "Via delle Grazie 56r", img: "https://via.placeholder.com/300x200?text=Fitz+Birrificio", link: "https://www.google.com/maps/place/Via+delle+Grazie,+56r,+16128+Genova+GE,+Italy", category: "dove-bere-e-mangiare", coords: [1300, 1000]},
{id: 11, name: "Casa Nawal", desc: "Piazza di Santa Croce 21r", img: "https://via.placeholder.com/300x200?text=Casa+Nawal", link: "https://www.google.com/maps/place/Piazza+Santa+Croce,+21r,+16128+Genova+GE,+Italy", category: "dove-bere-e-mangiare", coords: [1200, 1100]},

{id: 18, name: "Lucrezia Social Bar", desc: "Vico Caprettari 16", img: "https://via.placeholder.com/300x200?text=Lucrezia+Social+Bar", link: "https://www.google.com/maps/place/Vico+Caprettari,+16,+16123+Genova+GE,+Italy/", category: "dove-si-fa-tardi", coords: [1350, 1300]},

{id: 20, name: "Banano Tsunami", desc: "Porto Antico, Ponte Embriaco 1", img: "https://via.placeholder.com/300x200?text=Banano+Tsunami", link: "https://www.google.com/maps/place/Ponte+degli+Embriaci,+16128+Genova+GE,+Italy/", category: "dove-si-fa-tardi", coords: [1100, 1300]},

// COMUNITA CREATIVE
{id: 22, name: "Quasi Casa", desc: "Vico Doria 1", img: "https://via.placeholder.com/300x200?text=Quasi+Casa", link: "https://maps.google.com/?q=Vico+Doria+1,+Genova", category: "comunita-creative", coords: [1500, 1100]},
{id: 23, name: "KATARTIKA ART", desc: "Vico dei Greci 6", img: "https://via.placeholder.com/300x200?text=KATARTIKA+ART", link: "https://maps.google.com/?q=Vico+Greci+6,+Genova", category: "comunita-creative", coords: [1550, 1200]},
{id: 24, name: "U.S. San Bernardo", desc: "Via delle Grazie 40r", img: "https://via.placeholder.com/300x200?text=US+San+Bernardo", link: "https://maps.google.com/?q=Via+Grazie+40r,+Genova", category: "comunita-creative", coords: [1400, 1300]},
{id: 25, name: "Giardini Luzzati", desc: "Giardini Emanuele Luzzati 1", img: "https://via.placeholder.com/300x200?text=Giardini+Luzzati", link: "https://maps.google.com/?q=Giardini+Luzzati,+Genova", category: "comunita-creative", coords: [1600, 1250]},
{id: 26, name: "Cinemino Ad Astra", desc: "Vico della Cittadella 6", img: "https://via.placeholder.com/300x200?text=Cinemino+Ad+Astra", link: "https://maps.google.com/?q=Vico+Cittadella+6,+Genova", category: "comunita-creative", coords: [1500, 1350]},
{id: 27, name: "Zenuino", desc: "Vico del Fieno 27r", img: "https://via.placeholder.com/300x200?text=Zenuino", link: "https://www.google.com/maps/place/Vico+Fieno,+27r,+16123+Genova+GE,+Italy/", category: "comunita-creative", coords: [1450, 1100]},
{id: 28, name: "Libera collina di Castello", desc: "Piazza di Santa Maria in Passione", img: "https://via.placeholder.com/300x200?text=Libera+Collina", link: "https://www.google.com/maps/place/Piazza+Santa+Maria+in+Passione,+16123+Genova+GE,+Italy/", category: "comunita-creative", coords: [1550, 1400]}

        // 6. Aggiungi Marker
        pois.forEach(poi => {
            const marker = L.marker(poi.coords, { icon: createIcon(poi.category) }).addTo(map);
            marker.on('click', () => openPanel(poi));
        });

        // 7. Funzioni
        function openPanel(poi) {
            document.getElementById('poi-category').innerText = categoryLabels[poi.category] || poi.category;
            document.getElementById('poi-title').innerText = poi.name;
            document.getElementById('poi-desc').innerText = poi.desc;
            const img = document.getElementById('poi-img');
            img.src = poi.img;
            img.style.display = 'block';
            document.getElementById('poi-link').href = poi.link;
            document.getElementById('panel').classList.add('active');
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('active');
        }
    </script>
</body>
</html>
